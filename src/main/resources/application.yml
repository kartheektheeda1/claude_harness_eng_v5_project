spring:
  application:
    name: claimflow
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/claimflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:claimflow}
    password: ${DB_PASSWORD:claimflow}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
server:
  port: ${PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
claimflow:
  fraud:
    manual-review-threshold: ${FRAUD_MANUAL_THRESHOLD:50}
    reject-threshold: ${FRAUD_REJECT_THRESHOLD:80}
logging:
  structured:
    format:
      console: logstash
