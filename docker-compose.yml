services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: claimflow
      MYSQL_USER: claimflow
      MYSQL_PASSWORD: claimflow
      MYSQL_ROOT_PASSWORD: local-root-only
    volumes: [claimflow-db:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plocal-root-only"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build: .
    environment:
      DB_URL: jdbc:mysql://db:3306/claimflow?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: claimflow
      DB_PASSWORD: claimflow
    depends_on:
      db:
        condition: service_healthy
  web:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  claimflow-db:
